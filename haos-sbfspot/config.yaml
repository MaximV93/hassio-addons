---
name: HAOS-SBFspot (powerslider)
version: 2026.4.17.23
slug: haos-sbfspot
description: SBFspot addon — configurable polling + BT auto-reset + upstream bug fixes
url: "https://github.com/MaximV93/hassio-addons/tree/main/haos-sbfspot"
stage: experimental

image: "ghcr.io/maximv93/{arch}-addon-haos-sbfspot"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
init: false
# V2-05 REVERTED in 2026.4.17.9: host_network: false broke BT (`bthConnect()
# returned -1` on every poll). BlueZ raw BT sockets (AF_BLUETOOTH) bind on
# hci0 which is in the host network namespace. host_dbus: true alone
# gives D-Bus access (for management APIs) but not raw socket access.
# Keep host_network: true. Hardening must happen inside the container via
# capability drops in apparmor profile, not at the netns boundary.
host_network: true
host_dbus: true
homeassistant_api: true
panel_icon: mdi:solar-power-variant
map:
  - share:rw
services:
  - mysql:need
  - mqtt:want
options:
  Connection_Type: "Bluetooth"
  Sensors_HA: "No"
  # --- powerslider fork V2-07: defaults are plain values, not !secret refs.
  # Fresh install previously crashed with "secret BTAddress not found" unless
  # secrets.yaml was pre-populated. Users can still reference secrets via UI.
  BTAddress: ""
  Password: ""
  LocalBTAddress: ""
  IP_Address: "0.0.0.0"
  Plantname: "SBFspot"
  Latitude: "50.80"
  Longitude: "4.33"
  Timezone: "Europe/Brussels"
  DateTimeFormat: "%H:%M:%S %d-%m-%y"
  MIS_Enabled: false
  SQL_Database: "sbfspot"
  SQL_Hostname: "core-mariadb"
  SQL_Port: "3306"
  SQL_Username: "sbfspot"
  SQL_Password: ""
  MQTT_Host: "core-mosquitto"
  MQTT_Port: "1883"
  MQTT_User: ""
  MQTT_Pass: ""
  MQTT_Topic: "homeassistant/sbfspot_{plantname}/sbfspot_{serial}"
  MQTT_Data: >-
    PrgVersion,Plantname,Timestamp,SunRise,SunSet,InvSerial,InvName,InvTime,InvStatus,InvSwVer,InvClass,InvType,InvTemperature,InvGridRelay,EToday,ETotal,GridFreq,PACTot,PAC1,UAC1,IAC1,OperTm,FeedTm,PDCTot,UDC1,UDC2,IDC1,IDC2,PDC1,PDC2,BTSignal,InvWakeupTm,InvSleepTm
  PVoutput_SID: ""
  PVoutput_Key: ""
  LogLevel: info
  # --- powerslider fork polling + runtime controls ---
  PollIntervalDay: 5
  PollIntervalNight: 0
  DayStart: 6
  DayEnd: 22
  EnableUpload: true
  # V2-03: explicit timeout override (seconds). 0 = auto (PollIntervalDay*60-10).
  # Use when BT signal is marginal and legitimate runs exceed the auto cap.
  SBFspotTimeoutSec: 0
  # V4: sub-minute daemon polling (bypass cron for intervals below 60s).
  # 0 = disabled (use PollIntervalDay/Night via cron). >=5 = enable daemon,
  # skip cron day/night entries, run a tight loop instead. Min 5s = SMA
  # inverter internal sample rate. See docs/ADR-004.
  # V5+: default 5s (daemon). Users who want cron path set this to 0.
  PollIntervalSec: 5
  # V4: night daemon interval when PollIntervalSec is active. 0 = skip nights.
  PollIntervalNightSec: 0
  # V5: SpotData retention in days. 0 = disabled. Default 90.
  # Auto-activates only when PollIntervalSec >= 5 (sub-minute polling generates
  # 10-100x more rows than cron). Explicit override forces activation for cron
  # installs too.
  DbRetentionDays: 90
  # V5+ fixture capture: when >0, SBFspot runs with `-debug=N` for hex dumps,
  # and run-sbfspot.sh mirrors daily logs to /share/sbfspot-logs/. Use 5 for
  # maximum detail during protocol reverse-engineering. Reset to 0 for normal
  # operation (current default).
  SBFspotDebug: 0
schema:
  Connection_Type: list(Bluetooth|Ethernet)?
  Sensors_HA: list(No||Create||Purge|)?
  BTAddress: "str?"
  Password: "password?"
  LocalBTAddress: "str?"
  IP_Address: "str?"
  Plantname: "str?"
  # V2-08: MIS_Enabled is semantically a bool; schema int? kept UI as number
  # field. Switched to bool for a cleaner toggle; backward-compat: legacy int
  # values 0/1 get coerced by bashio::var.true / jq truthy check.
  MIS_Enabled: "bool?"
  OutputPath: "str?"
  OutputPathEvents: "str?"
  Latitude: "str?"
  Longitude: "str?"
  Timezone: "str?"
  DateTimeFormat: "str?"
  DateFormat: "str?"
  DecimalPoint: "str?"
  TimeFormat: "str?"
  SynchTime: "int?"
  SynchTimeLow: "int?"
  SynchTimeHigh: "int?"
  SunRSOffset: "int?"
  Locale: "str?"
  CalculateMissingSpotValues: "int?"
  BTConnectRetries: "int?"
  CSV_Export: "int?"
  CSV_ExtendedHeader: "int?"
  CSV_Header: "int?"
  CSV_SaveZeroPower: "int?"
  CSV_Delimiter: "str?"
  CSV_Spot_TimeSource: "str?"
  CSV_Spot_WebboxHeader: "int?"
  SQL_Database: "str?"
  SQL_Hostname: "str?"
  SQL_Port: "str?"
  SQL_Username: "str?"
  SQL_Password: "password?"
  MQTT_Publisher: "str?"
  MQTT_Host: "str?"
  MQTT_Port: "str?"
  MQTT_User: "str?"
  MQTT_Pass: "password?"
  MQTT_Topic: "str?"
  MQTT_ItemFormat: "str?"
  MQTT_ItemDelimiter: str?
  MQTT_PublisherArgs: str?
  MQTT_Data: "str?"
  PVoutput_SID: "password?"
  PVoutput_Key: "password?"
  LogLevel: list(debug|info||warning||error)?
  # --- powerslider fork additions ---
  PollIntervalDay: "int(1,30)?"
  PollIntervalNight: "int(0,60)?"
  DayStart: "int(0,23)?"
  DayEnd: "int(1,23)?"
  EnableUpload: "bool?"
  SBFspotTimeoutSec: "int(0,600)?"
  PollIntervalSec: "int(0,3600)?"
  PollIntervalNightSec: "int(0,3600)?"
  DbRetentionDays: "int(0,3650)?"
  SBFspotDebug: "int(0,5)?"
