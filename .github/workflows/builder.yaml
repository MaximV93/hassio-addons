---
name: Builder

# powerslider fork V3-06: cancel in-progress builds on new push to the same
# branch. Without this, 5 rapid pushes queue 5 sequential builds (~10 min each)
# burning GHA minutes and delaying the latest release. Only the final push's
# build matters when we're iterating.
concurrency:
  group: builder-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "config.*"
  super_secret: ${{ secrets.cassign }}
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get changed files
        id: changed_files
        uses: jitterbit/get-changed-files@v1

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons
          for addon in ${{ steps.addons.outputs.addons }}; do
            if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon ]]; then
              for file in ${{ env.MONITORED_FILES }}; do
                  if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon/$file ]]; then
                    if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                      changed_addons+=("\"${addon}\",");
                    fi
                  fi
              done
            fi
          done

          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "::set-output name=changed::true";
            echo "::set-output name=addons::[$changed]";
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
          fi
  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    # V5 supply chain: id-token for Cosign OIDC, packages write for image push,
    # attestations for SBOM upload, contents read for checkout.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check if add-on should be built
        id: check
        run: |
          if [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
             echo "::set-output name=build_arch::true";
             echo "::set-output name=image::$(echo ${{ steps.info.outputs.image }} | cut -d'/' -f3)";
             if [[ -z "${{ github.head_ref }}" ]] && [[ "${{ github.event_name }}" == "push" ]]; then
                 echo "BUILD_ARGS=" >> $GITHUB_ENV;
             fi
           else
             echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build";
             echo "::set-output name=build_arch::false";
          fi

      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test'
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.addon }} add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: home-assistant/builder@2025.11.0
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target /data/${{ matrix.addon }} \
            --image "${{ steps.check.outputs.image }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon

      # powerslider fork V5: supply-chain hardening. Cosign keyless signing
      # via GitHub OIDC (no secrets to rotate). Trivy CVE scan + SBOM in SPDX
      # format. Runs only on push (not --test builds).
      - name: Install Cosign
        if: env.BUILD_ARGS != '--test' && steps.check.outputs.build_arch == 'true'
        continue-on-error: true  # upstream cosign-installer regression (v2.5.3 default rejected); signing is non-blocking
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v2.6.0

      - name: Sign image with Cosign
        if: env.BUILD_ARGS != '--test' && steps.check.outputs.build_arch == 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          VERSION=$(grep -E '^version:' ./${{ matrix.addon }}/config.yaml | awk '{print $2}')
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-$(basename ${{ matrix.addon }})"
          for TAG in "${VERSION}" "latest"; do
            cosign sign --yes "${IMAGE}:${TAG}" || echo "Cosign sign of ${IMAGE}:${TAG} failed (non-blocking)"
          done

      - name: Trivy CVE scan
        if: env.BUILD_ARGS != '--test' && steps.check.outputs.build_arch == 'true'
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-$(basename ${{ matrix.addon }}):latest"
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Generate SBOM (SPDX)
        if: env.BUILD_ARGS != '--test' && steps.check.outputs.build_arch == 'true'
        uses: anchore/sbom-action@v0.24.0
        continue-on-error: true
        with:
          image: "ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-$(basename ${{ matrix.addon }}):latest"
          format: spdx-json
          output-file: "sbom-${{ matrix.arch }}-${{ matrix.addon }}.spdx.json"
          upload-artifact: true
